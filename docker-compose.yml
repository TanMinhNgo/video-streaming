name: video-streaming

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: video-streaming-backend
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - REDIS_URL=redis://redis:6379
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: video-streaming-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  redis:
    image: redis:7-alpine
    container_name: video-streaming-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  redis_data:
