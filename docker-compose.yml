name: video-streaming

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: video-streaming-backend
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - REDIS_URL=redis://localhost:6379
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: video-streaming-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  redis_data:
